<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Arquivos</title>
  <link rel="stylesheet" href="arquivos.css">
</head>

<body>

<div class="arquivos-container">

  <!-- LOGIN GERAL -->
  <div id="login">
    <h1>Arquivos da Corte</h1>
    <p class="aviso">
    
      Digite a senha para acessar os arquivos escondidos.
    </p>

    <input type="password" id="senhaGeral" placeholder="Senha de acesso">
    <button onclick="verificarSenhaGeral()">Acessar</button>
  </div>

  <!-- CAPÍTULOS -->
  <div id="area-capitulos" class="hidden">

    <h2>Capítulos</h2>

<div class="capitulos-lista">
  <button onclick="pedirSenha('prologo')">Prólogo</button>
  <button onclick="pedirSenha('estranhos')">Estranhos</button>
  <button onclick="pedirSenha('tradicoes')">Tradições</button>
  <button onclick="pedirSenha('amarilis')">Amarilis</button>
  <button onclick="pedirSenha('papofurado')">Papo Furado</button>
  <button onclick="pedirSenha('dama')">Dama</button>
  <button onclick="pedirSenha('lehiaequor')">Lehi Aequor</button>
  <button onclick="pedirSenha('perigo')">Perigo.</button>
  <button onclick="pedirSenha('melina')">Melina Cronida</button>
  <button onclick="pedirSenha('meera')">Meera Khamet</button>
  <button onclick="pedirSenha('anima')">Ânima</button>
  <button onclick="pedirSenha('consequencias')">Consequências</button>
  <button onclick="pedirSenha('halan')">Halan Veridan</button>
  <button onclick="pedirSenha('algoruim')">Algo Ruim</button>
</div>

    <div class="conteudo" id="conteudo"></div>
  </div>

</div>

<!-- MODAL SENHA -->
<div class="modal hidden" id="modalSenha">
  <div class="modal-box">
    <span class="fechar" onclick="fecharModal()">×</span>
    <h3 id="tituloCapitulo"></h3>

    <input type="password" id="senhaCapitulo" placeholder="Código do capítulo">
    <button onclick="verificarSenhaCapitulo()">Desbloquear</button>
  </div>
</div>

<script>



/* ===== SENHAS ===== */
const senhaGeral = "monopolio";

const senhasCapitulos = {
  prologo: "0072",
  estranhos: "0112",
  tradicoes: "0230",
  amarilis: "0341",
  papofurado: "3592",
  dama: "4702",
  lehiaequor: "6832",
  perigo: "7952",
  melina: "8132",
  meera: "9116",
  anima: "1128",
  consequencias: "1472",
  halan: "2752",
  algoruim: "3332"
};

let capituloAtual = "";

/* LOGIN */
function verificarSenhaGeral() {
  if (document.getElementById("senhaGeral").value === senhaGeral) {
    document.getElementById("login").style.display = "none";
    document.getElementById("area-capitulos").classList.remove("hidden");
  } else {
    alert("Senha incorreta.");
  }
}

/* ABRIR MODAL */
function pedirSenha(cap) {
  capituloAtual = cap;

  const titulos = {
    prologo: "Prólogo",
    estranhos: "Estranhos",
    tradicoes: "Tradições",
    amarilis: "Amarilis",
    papofurado: "Papo Furado",
    dama: "Dama",
    lehiaequor: "Lehi Aequor",
    perigo: "Perigo.",
    melina: "Melina Cronida",
    meera: "Meera Khamet",
    anima: "Ânima",
    consequencias: "Consequências",
    halan: "Halan Veridan",
    algoruim: "Algo Ruim"
  };

  document.getElementById("tituloCapitulo").innerText = titulos[cap];
  document.getElementById("modalSenha").classList.remove("hidden");
}

/* FECHAR MODAL */
function fecharModal() {
  document.getElementById("modalSenha").classList.add("hidden");
  document.getElementById("senhaCapitulo").value = "";
}

/* VERIFICAR CAPÍTULO */
function verificarSenhaCapitulo() {
  const senha = document.getElementById("senhaCapitulo").value;

  if (senha !== senhasCapitulos[capituloAtual]) {
    alert("Código incorreto.");
    return;
  }

  mostrarConteudo(capituloAtual);
  fecharModal();
}
